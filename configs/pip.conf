# Global pip config.
# Installed to ~/.config/pip/pip.conf by install.sh.

[global]
# Refuse to install outside a virtualenv.
# Use `uv venv && source .venv/bin/activate` before pip install.
require-virtualenv = true

# Skip the "new version of pip available" check.
disable-pip-version-check = true

[install]
# Supply-chain: ISO-8601 duration. Requires pip >= 26.0.
uploaded-prior-to = P7D
